<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GovCareAI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header>
        <button class="nav-button" onclick="window.location.href='index.html'">HOME</button>
        <h1 class="logo">GovCareAI</h1>
        <button class="nav-button" onclick="window.location.href='citizen-login.html'">LOGIN</button>
    </header>

    <!-- Main Content -->
    <main>
        <section class="hero-section scroll-reveal">
            <div class="glass-panel form-container">
                <h2>Reset Password</h2>
                <p style="margin-bottom: 1.5rem; color: #cccccc;">Enter your new password to reset your account.</p>
                
                <form id="reset-password-form">
                    <div class="form-group">
                        <label for="password" class="form-label">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" name="password" class="form-input" placeholder="Enter new password" required>
                            <span class="password-toggle" onclick="togglePasswordVisibility('password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--neon-blue);">👁️</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm new password" required>
                            <span class="password-toggle" onclick="togglePasswordVisibility('confirm_password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--neon-blue);">👁️</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="neon-button">RESET PASSWORD</button>
                </form>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <a href="citizen-login.html" style="color: var(--neon-blue); text-decoration: none;">BACK TO LOGIN</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About GovCareAI</h3>
                <p>GovCareAI is a revolutionary platform that uses artificial intelligence to prioritize and manage civic complaints.</p>
            </div>
            
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: support@govcareai.com</p>
                <p>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Handle reset password form
        document.addEventListener('DOMContentLoaded', function() {
            const resetPasswordForm = document.getElementById('reset-password-form');
            
            if (resetPasswordForm) {
                resetPasswordForm.addEventListener('submit', handleResetPassword);
            }
        });
        
        async function handleResetPassword(event) {
            event.preventDefault();
            
            // Get form data
            const formData = new FormData(event.target);
            const password = formData.get('password');
            const confirm_password = formData.get('confirm_password');
            
            // Validate form
            if (!password || !confirm_password) {
                GovCareAI.showNotification('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirm_password) {
                GovCareAI.showNotification('Passwords do not match', 'error');
                return;
            }
            
            // Extract token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                GovCareAI.showNotification('Invalid or missing reset token', 'error');
                return;
            }
            
            // Show loading spinner
            const submitButton = event.target.querySelector('button[type="submit"]');
            const originalText = submitButton.innerHTML;
            submitButton.innerHTML = '<div class="loading-spinner"></div>';
            submitButton.disabled = true;
            
            try {
                // Make API call to backend
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token,
                        password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    GovCareAI.showNotification('Password reset successful!', 'success');
                    
                    // Redirect to login page
                    setTimeout(() => {
                        window.location.href = 'citizen-login.html';
                    }, 2000);
                } else {
                    GovCareAI.showNotification(data.message || 'Password reset failed. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                GovCareAI.showNotification('Password reset failed. Please try again.', 'error');
            } finally {
                // Restore button
                submitButton.innerHTML = originalText;
                submitButton.disabled = false;
            }
        }
    </script>
</body>
</html>
