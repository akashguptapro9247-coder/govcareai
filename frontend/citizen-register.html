<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration - GovCareAI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header>
        <button class="nav-button" onclick="window.location.href='index.html'">HOME</button>
        <h1 class="logo">GovCareAI</h1>
        <button class="nav-button" onclick="window.location.href='citizen-login.html'">LOGIN</button>
    </header>

    <!-- Main Content -->
    <main>
        <section class="hero-section scroll-reveal">
            <div class="glass-panel form-container">
                <h2>Citizen Registration</h2>
                <form id="citizen-register-form">
                    <div class="form-group">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" id="full_name" name="full_name" class="form-input" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gmail" class="form-label">Email Address</label>
                        <input type="email" id="gmail" name="gmail" class="form-input" placeholder="your.email@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="Enter your phone number" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required>
                            <span class="password-toggle" onclick="togglePasswordVisibility('password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--neon-blue);">👁️</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <div style="position: relative;">
                            <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm your password" required>
                            <span class="password-toggle" onclick="togglePasswordVisibility('confirm_password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--neon-blue);">👁️</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="neon-button">REGISTER NOW</button>
                </form>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <a href="citizen-login.html" style="color: var(--neon-blue); text-decoration: none;">ALREADY HAVE AN ACCOUNT? LOGIN</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About GovCareAI</h3>
                <p>GovCareAI is a revolutionary platform that uses artificial intelligence to prioritize and manage civic complaints.</p>
            </div>
            
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>Email: support@govcareai.com</p>
                <p>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
